services:
  # Grocery Store Management Backend
  grocery-backend:
    build:
      context: ./Grocery_Store_Management/backend/src
      args:
        - PORT=5000
    container_name: grocery-store-backend
    ports:
      - "5000:5000"
    env_file:
      - ./Grocery_Store_Management/backend/src/.env
    environment:
      - DELIVERY_SERVICE_URL=http://delivery-service:5005/api
    restart: unless-stopped
    networks:
      - grocery-network

  # User Management & Payment Service
  user-service:
    build: ./User_Management_and_Payment_Service/backend
    container_name: user-payment-service
    ports:
      - "5003:5003"
    env_file:
      - ./User_Management_and_Payment_Service/backend/.env
    environment:
      - ORDER_SERVICE_URL=http://order-service:5004/api
      - GROCERY_SERVICE_URL=http://grocery-store-backend:5000/api
      - DELIVERY_SERVICE_URL=http://delivery-service:5005/api
    volumes:
      - ./User_Management_and_Payment_Service/backend/uploads:/app/uploads
    restart: unless-stopped
    networks:
      - grocery-network

  # Delivery Management Backend
  delivery-backend:
    build: ./Delivery_Management/backend
    container_name: delivery-service
    ports:
      - "5005:5005"
    env_file:
      - ./Delivery_Management/backend/.env
    restart: unless-stopped
    networks:
      - grocery-network

  # Order & Notification Management
  order-service:
    build: ./Order_and_Notification_Management/backend
    container_name: order-service
    ports:
      - "5004:5004"
    env_file:
      - ./Order_and_Notification_Management/backend/.env
    environment:
      - USER_SERVICE_URL=http://user-payment-service:5003/api
    restart: unless-stopped
    networks:
      - grocery-network

  # Admin Frontend
  admin-frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=http://127.0.0.1:5000/api
        - VITE_API_URL_ORDER=http://127.0.0.1:5004/api
        - VITE_DELIVERY_SERVICE_URL=http://127.0.0.1:5005/api
        - VITE_USER_SERVICE_URL=http://127.0.0.1:5003/api
    container_name: admin-dashboard
    ports:
      - "5173:80"
    restart: unless-stopped
    networks:
      - grocery-network

  # Customer Frontend
  customer-frontend:
    build:
      context: ./frontend-customer
      args:
        - VITE_API_URL_USER_MANAGEMENT_SERVICE=http://127.0.0.1:5003/api
        - VITE_API_URL_GROCERY_MANAGEMENT_SERVICE=http://127.0.0.1:5000/api
        - VITE_DELIVERY_SERVICE_URL=http://127.0.0.1:5005/api
        - VITE_STRIPE_PUBLISHABLE_KEY=pk_test_51T8FA0CHMdOpXSyUdEp5T6KaDuOecXRk4IfE8Hqf15trW1kIOaXW0iyMvYOXJ7UhKyLYKXv1kInx2VQxXgiav2aU00tsvkgszS
    container_name: customer-app
    ports:
      - "5174:80"
    restart: unless-stopped
    networks:
      - grocery-network

networks:
  grocery-network:
    driver: bridge
