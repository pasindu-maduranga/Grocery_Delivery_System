name: CI Pipeline

on:
  push:
    branches: [ "development", "main" ]
  pull_request:
    branches: [ "development", "main" ]

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        
    - name: Install and Build Frontend Admin
      working-directory: ./frontend
      run: |
        npm install
        npm run build --if-present
        
    - name: Install and Build Frontend Customer
      working-directory: ./frontend-customer
      run: |
        npm install
        npm run build --if-present

  build-backend-delivery:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
    - name: Install dependencies Wait Delivery
      working-directory: ./Delivery_Management/backend
      run: npm install

  build-backend-grocery:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
    - name: Install dependencies Grocery Store
      working-directory: ./Grocery_Store_Management/backend
      run: npm install

  build-backend-user-payment:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
    - name: Install dependencies User & Payment
      working-directory: ./User_Management_and_Payment_Service/backend
      run: npm install
