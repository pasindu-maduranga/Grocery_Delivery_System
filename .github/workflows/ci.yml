name: CI Pipeline

on:
  push:
    branches: [ "development", "main" ]
  pull_request:
    branches: [ "development", "main" ]

jobs:
  # 1. FRONTEND BUILDS
  build-frontend-admin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'
      - name: Install and Build Admin Frontend
        working-directory: ./frontend
        run: |
          npm ci
          npm run build --if-present

  build-frontend-customer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: './frontend-customer/package-lock.json'
      - name: Install and Build Customer Frontend
        working-directory: ./frontend-customer
        run: |
          npm ci
          npm run build --if-present

  # 2. BACKEND BUILDS (Installing dependencies for all 4 services)
  build-backend-grocery:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      - name: Install dependencies Grocery Store
        working-directory: ./Grocery_Store_Management/backend/src
        run: npm ci

  build-backend-user-payment:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      - name: Install dependencies User & Payment
        working-directory: ./User_Management_and_Payment_Service/backend
        run: npm ci

  build-backend-delivery:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      - name: Install dependencies Delivery Management
        working-directory: ./Delivery_Management/backend
        run: npm ci

  build-backend-order:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      - name: Install dependencies Order & Notification
        working-directory: ./Order_and_Notification_Management/backend
        run: npm ci
