name: Azure DevOps (Build & Deploy)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  RG_NAME: grocery-delivery-rg
  LOCATION: eastus

jobs:
  security-scan:
    name: 🛡️ SonarCloud Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v3.0.0
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  build-and-deploy:
    name: 🚀 Build & Deploy to Azure
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🔑 Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: 🏗️ Get Registry Info
        id: login-acr
        run: |
          # ✅ Get ACR name and server (fixed - not using run_id)
          ACR_NAME=$(az acr list --resource-group ${{ env.RG_NAME }} --query "[0].name" -o tsv)
          ACR_SERVER=$(az acr list --resource-group ${{ env.RG_NAME }} --query "[0].loginServer" -o tsv)
          ACR_ID=$(az acr list --resource-group ${{ env.RG_NAME }} --query "[0].id" -o tsv)
          
          echo "acr_name=$ACR_NAME" >> $GITHUB_OUTPUT
          echo "acr_server=$ACR_SERVER" >> $GITHUB_OUTPUT
          echo "acr_id=$ACR_ID" >> $GITHUB_OUTPUT
          
          az acr login --name $ACR_NAME

      - name: 🐳 Build & Push Images
        run: |
          ACR=${{ steps.login-acr.outputs.acr_server }}
          SHA=${{ github.sha }}

          # Backend Services
          docker build ./Grocery_Store_Management/backend/src -t $ACR/grocery-backend:$SHA -t $ACR/grocery-backend:latest
          docker push $ACR/grocery-backend --all-tags

          docker build ./User_Management_and_Payment_Service/backend -t $ACR/user-service:$SHA -t $ACR/user-service:latest
          docker push $ACR/user-service --all-tags

          docker build ./Delivery_Management/backend -t $ACR/delivery-backend:$SHA -t $ACR/delivery-backend:latest
          docker push $ACR/delivery-backend --all-tags

          docker build ./Order_and_Notification_Management/backend -t $ACR/order-service:$SHA -t $ACR/order-service:latest
          docker push $ACR/order-service --all-tags

          # Frontend Services
          DOMAIN=$(az containerapp env show \
            --name grocery-delivery-env \
            --resource-group ${{ env.RG_NAME }} \
            --query "properties.defaultDomain" -o tsv)

          docker build ./frontend \
            --build-arg VITE_API_URL=https://grocery-backend.$DOMAIN/api \
            --build-arg VITE_API_URL_ORDER=https://order-service.$DOMAIN/api \
            -t $ACR/admin-frontend:$SHA -t $ACR/admin-frontend:latest
          docker push $ACR/admin-frontend --all-tags

          docker build ./frontend-customer \
            --build-arg VITE_API_URL_USER_MANAGEMENT_SERVICE=https://user-service.$DOMAIN/api \
            --build-arg VITE_API_URL_GROCERY_MANAGEMENT_SERVICE=https://grocery-backend.$DOMAIN/api \
            -t $ACR/customer-frontend:$SHA -t $ACR/customer-frontend:latest
          docker push $ACR/customer-frontend --all-tags

      - name: 🚀 Deploy All Apps
        run: |
          # ✅ All variables properly defined here
          ACR_SERVER=${{ steps.login-acr.outputs.acr_server }}
          ACR_ID=${{ steps.login-acr.outputs.acr_id }}
          SHA=${{ github.sha }}
          RG_NAME=${{ env.RG_NAME }}
          MONGO_URI="${{ secrets.MONGO_URI }}"
          JWT_SECRET="${{ secrets.JWT_SECRET }}"

          deploy_app() {
            local app_name=$1
            local image=$2
            local env_vars=$3

            echo "Deploying $app_name..."

            PRINCIPAL_ID=$(az containerapp identity assign \
              -n $app_name -g $RG_NAME \
              --system-assigned \
              --query "principalId" -o tsv)

            az role assignment create \
              --assignee $PRINCIPAL_ID \
              --scope $ACR_ID \
              --role "AcrPull" 2>/dev/null || true

            if [ -z "$env_vars" ]; then
              az containerapp update -n $app_name -g $RG_NAME \
                --image $image \
                --registry-server $ACR_SERVER \
                --registry-identity system
            else
              az containerapp update -n $app_name -g $RG_NAME \
                --image $image \
                --set-env-vars $env_vars \
                --registry-server $ACR_SERVER \
                --registry-identity system
            fi
            echo "✅ $app_name deployed!"
          }

          # Deploy all apps
          deploy_app "grocery-backend" "$ACR_SERVER/grocery-backend:$SHA" "MONGO_URI=$MONGO_URI JWT_SECRET=$JWT_SECRET"
          deploy_app "user-service" "$ACR_SERVER/user-service:$SHA" "MONGO_URI=$MONGO_URI"
          deploy_app "delivery-backend" "$ACR_SERVER/delivery-backend:$SHA" "MONGO_URI=$MONGO_URI"
          deploy_app "order-service" "$ACR_SERVER/order-service:$SHA" "MONGO_URI=$MONGO_URI JWT_SECRET=$JWT_SECRET"
          deploy_app "admin-frontend" "$ACR_SERVER/admin-frontend:$SHA" ""
          deploy_app "customer-frontend" "$ACR_SERVER/customer-frontend:$SHA" ""

          echo "🎉 All apps deployed successfully!"